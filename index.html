<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aether Throne</title>
    <style>
      /*
       * Boot-critical styles only. The full UI theme lives in src/ui/styles/ui.css.
       *
       * Layering model:
       *   z 0  — #game-canvas   (the in-match Three.js viewport; hidden until a match starts)
       *   z 10 — #ui-root       (React overlay: menus, lobby, HUD)
       *
       * #ui-root itself never eats mouse events; each screen component decides.
       * Full-screen menu/lobby screens re-enable pointer-events on their root,
       * while the in-game HUD keeps pass-through so clicks reach the canvas.
       */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
      }
      #game-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
        outline: none;
      }
      #game-canvas.hidden {
        display: none;
      }
      #ui-root {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas" class="hidden" tabindex="-1"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
